[graph]
targets = []

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "OpenSSL",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
]
exceptions = [
  { allow = ["AGPL-3.0-or-later"], name = "oxide-sloc" },
  { allow = ["AGPL-3.0-or-later"], name = "sloc-cli" },
  { allow = ["AGPL-3.0-or-later"], name = "sloc-config" },
  { allow = ["AGPL-3.0-or-later"], name = "sloc-core" },
  { allow = ["AGPL-3.0-or-later"], name = "sloc-languages" },
  { allow = ["AGPL-3.0-or-later"], name = "sloc-report" },
  { allow = ["AGPL-3.0-or-later"], name = "sloc-web" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
version = 2
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
