services:
  oxide-sloc:
    build: .
    image: oxide-sloc
    ports:
      - "4317:4317"
    restart: unless-stopped
    environment:
      - SLOC_BROWSER=/usr/bin/chromium
      - RUST_LOG=info
      # SECURITY (REQUIRED for server deployments): set a strong random API key.
      # Generate one with: openssl rand -hex 32
      # All protected endpoints will require: Authorization: Bearer <key>
      # Leaving this unset logs a warning and runs unauthenticated — safe only
      # on localhost or behind a trusted network boundary.
      - SLOC_API_KEY=${SLOC_API_KEY:?SLOC_API_KEY must be set — run: export SLOC_API_KEY=$(openssl rand -hex 32)}
      # SECURITY: restrict the web UI to scanning only the mounted /repo path.
      # Add more colon-separated roots if you mount additional volumes.
      - SLOC_ALLOWED_ROOTS=/repo
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M
    volumes:
      # Mount a host directory to analyze it via the web UI or CLI.
      # Example: docker compose run oxide-sloc analyze /repo --plain
      - type: bind
        source: ${SLOC_TARGET:-./tmp-sloc}
        target: /repo
        read_only: true
      # Persist generated reports across restarts.
      - type: bind
        source: ./out
        target: /app/out
