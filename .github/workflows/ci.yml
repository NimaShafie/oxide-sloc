name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  RUST_LOG: warn
  OUT_DIR: ci-out
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt in ahead of the June 2026 forced migration

jobs:
  check:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Install system dependencies (rfd / native file dialog)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libgtk-3-dev \
            libxdo-dev

      - name: Lint
        run: bash ci/lint.sh

      - name: Build
        run: bash ci/build.sh

      - name: Test
        run: bash ci/test.sh

  smoke:
    name: CLI smoke tests
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          prefix-key: "v1-smoke"

      - name: Install system dependencies (rfd / native file dialog)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libgtk-3-dev \
            libxdo-dev

      - name: Build release binary
        run: bash ci/release.sh

      - name: Plain summary
        run: ./target/release/oxide-sloc analyze tests/fixtures/basic --plain

      - name: Per-file breakdown
        run: ./target/release/oxide-sloc analyze tests/fixtures/basic --per-file --plain

      - name: JSON + HTML reports
        run: |
          mkdir -p $OUT_DIR
          ./target/release/oxide-sloc analyze tests/fixtures/basic \
            --report-title "CI run ${{ github.run_number }}" \
            --json-out $OUT_DIR/result.json \
            --html-out $OUT_DIR/report.html
          test -s $OUT_DIR/result.json
          test -s $OUT_DIR/report.html

      - name: Re-render from saved JSON
        run: |
          ./target/release/oxide-sloc report $OUT_DIR/result.json \
            --html-out $OUT_DIR/re-rendered.html
          test -s $OUT_DIR/re-rendered.html

      - name: Policy variants
        run: |
          for policy in code-only code-and-comment comment-only separate-mixed-category; do
            echo "--- policy: $policy ---"
            ./target/release/oxide-sloc analyze tests/fixtures/basic \
              --plain --mixed-line-policy "$policy"
          done

      - name: HTML content sanity
        run: grep -q "OxideSLOC" $OUT_DIR/report.html

      - name: Web UI health check
        run: |
          ./target/release/oxide-sloc serve &
          SERVER_PID=$!
          sleep 4
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4317/)
          kill $SERVER_PID 2>/dev/null || true
          [ "$HTTP_CODE" = "200" ] || (echo "Expected 200, got $HTTP_CODE" && exit 1)

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ci-reports-${{ github.run_number }}
          path: ci-out/
          if-no-files-found: ignore
