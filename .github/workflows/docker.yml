name: Docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write  # required for SLSA provenance attestation and cosign OIDC signing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt in ahead of the June 2026 forced migration

jobs:
  build-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Validate workspace structure
        run: |
          # Confirm every workspace crate directory exists and has a Cargo.toml.
          # A missing crate here means .dockerignore or a bad merge excluded it,
          # and the Docker build would fail with a cryptic manifest error.
          for crate in sloc-config sloc-languages sloc-core sloc-report sloc-web sloc-cli; do
            if [ ! -f "crates/${crate}/Cargo.toml" ]; then
              echo "ERROR: crates/${crate}/Cargo.toml is missing — workspace is incomplete"
              exit 1
            fi
          done
          # Confirm the vendor archive and its checksum are both present.
          if [ ! -f vendor.tar.xz ] || [ ! -f vendor.tar.xz.sha256 ]; then
            echo "ERROR: vendor.tar.xz or vendor.tar.xz.sha256 is missing"
            exit 1
          fi
          sha256sum -c vendor.tar.xz.sha256
          echo "Workspace structure OK"

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # provenance: true is the default — SLSA build provenance attestations are generated
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign image with cosign (keyless via GitHub OIDC)
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository }}@${DIGEST}"
          cosign sign --yes "${IMAGE_REF}"
