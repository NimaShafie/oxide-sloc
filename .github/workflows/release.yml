name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: oxide-sloc-linux-x86_64
            binary: oxide-sloc

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: oxide-sloc-windows-x86_64.exe
            binary: oxide-sloc.exe

          - os: macos-13
            target: x86_64-apple-darwin
            artifact: oxide-sloc-macos-x86_64
            binary: oxide-sloc

          - os: macos-14
            target: aarch64-apple-darwin
            artifact: oxide-sloc-macos-arm64
            binary: oxide-sloc

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab  # v2.7.5
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux musl target only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Add cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p oxide-sloc --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Detect pre-release
        id: pre
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ -(alpha|beta|rc)\. ]] || [[ "$TAG" =~ -(alpha|beta|rc)$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            # Extract the label (alpha / beta / rc) for the notice
            LABEL=$(echo "$TAG" | grep -oP '(?<=-)(alpha|beta|rc)')
            echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "label=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          files: artifacts/*
          prerelease: ${{ steps.pre.outputs.is_prerelease }}
          generate_release_notes: true
          body: |
            ${{ steps.pre.outputs.is_prerelease == 'true' && format('> **{0} build** — not production-ready. Intended for testing and feedback only. Breaking changes may occur before a stable release.', steps.pre.outputs.label) || '' }}

            ## Binaries

            | Platform | File |
            |---|---|
            | Linux x86-64 | `oxide-sloc-linux-x86_64` |
            | Windows x86-64 | `oxide-sloc-windows-x86_64.exe` |
            | macOS x86-64 | `oxide-sloc-macos-x86_64` |
            | macOS Apple Silicon | `oxide-sloc-macos-arm64` |

            ```bash
            # Linux / macOS — make executable and move to PATH
            chmod +x oxide-sloc-linux-x86_64
            mv oxide-sloc-linux-x86_64 /usr/local/bin/oxide-sloc

            # Windows — rename and add to PATH
            ren oxide-sloc-windows-x86_64.exe oxide-sloc.exe
            ```
