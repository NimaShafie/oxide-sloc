name: Update dist bundles

# Run manually from the Actions tab, or automatically after every release tag.
# Builds fresh platform binaries, packages them as zip / tar.gz, and commits
# them to dist/ so the repo is always ready for air-gapped / offline deployment.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt in ahead of the June 2026 forced migration

jobs:
  # ── Build each platform binary ────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: oxide-sloc
            bundle: oxide-sloc-linux-x86_64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: oxide-sloc.exe
            bundle: oxide-sloc-windows-x64.zip

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: dist-${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Add cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Extract vendor archive (Linux)
        if: runner.os == 'Linux'
        run: |
          sha256sum -c vendor.tar.xz.sha256
          tar -xJf vendor.tar.xz

      - name: Extract vendor archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $expected = (Get-Content vendor.tar.xz.sha256 -Raw).Trim().Split()[0]
          $actual   = (Get-FileHash vendor.tar.xz -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected) { Write-Error "SHA-256 mismatch: expected $expected got $actual"; exit 1 }
          tar -xJf vendor.tar.xz

      - name: Build
        run: cargo build --release -p oxide-sloc --target ${{ matrix.target }}

      - name: Package — Linux tar.gz
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/oxide-sloc /tmp/oxide-sloc
          tar czf ${{ matrix.bundle }} -C /tmp oxide-sloc

      - name: Package — Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\oxide-sloc.exe" "oxide-sloc.exe"
          Compress-Archive -Path oxide-sloc.exe -DestinationPath ${{ matrix.bundle }} -Force

      - name: Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.bundle }}
          path: ${{ matrix.bundle }}

  # ── Commit both bundles into dist/ ────────────────────────────────────────
  commit-dist:
    name: Commit dist bundles
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main

      - name: Download Linux bundle
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: oxide-sloc-linux-x86_64.tar.gz
          path: dist/

      - name: Download Windows bundle
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: oxide-sloc-windows-x64.zip
          path: dist/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/oxide-sloc-linux-x86_64.tar.gz dist/oxide-sloc-windows-x64.zip
          git diff --cached --quiet && echo "dist already up to date" && exit 0
          git commit -m "chore: refresh dist bundles [skip ci]"
          git push origin HEAD:main
