name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  RUST_LOG: warn
  OUT_DIR: ci-out

jobs:
  check:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache vendor/
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        id: vendor-cache
        with:
          path: vendor/
          key: vendor-${{ hashFiles('vendor.tar.xz') }}

      - name: Decompress vendor sources
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: tar -xJf vendor.tar.xz

      - name: Cache cargo
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab  # v2.7.5
        with:
          prefix-key: "v2-vendor"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Unit tests
        run: cargo test --workspace

  smoke:
    name: CLI smoke tests
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - name: Cache vendor/
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        id: vendor-cache
        with:
          path: vendor/
          key: vendor-${{ hashFiles('vendor.tar.xz') }}

      - name: Decompress vendor sources
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: tar -xJf vendor.tar.xz

      - name: Cache cargo
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab  # v2.7.5
        with:
          prefix-key: "v2-vendor"

      - name: Build release binary
        run: cargo build --release -p oxide-sloc

      - name: Plain summary
        run: ./target/release/oxide-sloc analyze samples/basic --plain

      - name: Per-file breakdown
        run: ./target/release/oxide-sloc analyze samples/basic --per-file --plain

      - name: JSON + HTML reports
        run: |
          mkdir -p $OUT_DIR
          ./target/release/oxide-sloc analyze samples/basic \
            --report-title "CI run ${{ github.run_number }}" \
            --json-out $OUT_DIR/result.json \
            --html-out $OUT_DIR/report.html
          test -s $OUT_DIR/result.json
          test -s $OUT_DIR/report.html

      - name: Re-render from saved JSON
        run: |
          ./target/release/oxide-sloc report $OUT_DIR/result.json \
            --html-out $OUT_DIR/re-rendered.html
          test -s $OUT_DIR/re-rendered.html

      - name: Policy variants
        run: |
          for policy in code-only code-and-comment comment-only separate-mixed-category; do
            echo "--- policy: $policy ---"
            ./target/release/oxide-sloc analyze samples/basic \
              --plain --mixed-line-policy "$policy"
          done

      - name: HTML content sanity
        run: grep -q "OxideSLOC" $OUT_DIR/report.html

      - name: Web UI health check
        run: |
          ./target/release/oxide-sloc serve &
          SERVER_PID=$!
          sleep 4
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4317/)
          kill $SERVER_PID 2>/dev/null || true
          [ "$HTTP_CODE" = "200" ] || (echo "Expected 200, got $HTTP_CODE" && exit 1)

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ci-reports-${{ github.run_number }}
          path: ci-out/
          if-no-files-found: ignore
