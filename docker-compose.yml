services:
  oxide-sloc:
    build: .
    image: oxide-sloc
    ports:
      - "4317:4317"
    restart: unless-stopped
    environment:
      - SLOC_BROWSER=/usr/bin/chromium
      - RUST_LOG=info
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M
    volumes:
      # Mount a host directory to analyze it via the web UI or CLI.
      # Example: docker compose run oxide-sloc analyze /repo --plain
      - type: bind
        source: ${SLOC_TARGET:-./tmp-sloc}
        target: /repo
        read_only: true
      # Persist generated reports across restarts.
      - type: bind
        source: ./out
        target: /app/out
