name: Update dist bundles

# Run manually from the Actions tab, or automatically after every release tag.
# Builds fresh platform binaries, packages them as zip / tar.gz, and uploads
# them as assets on the corresponding GitHub release.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to (e.g. v1.3.1)'
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt in ahead of the June 2026 forced migration

jobs:
  # ── Build each platform binary ────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: oxide-sloc
            bundle: oxide-sloc-linux-x86_64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: oxide-sloc.exe
            bundle: oxide-sloc-windows-x64.zip

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: dist-${{ matrix.target }}

      - name: Install musl tools and rfd system deps (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            musl-tools \
            libwayland-dev \
            libgtk-3-dev \
            libxdo-dev

      - name: Add cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p oxide-sloc --target ${{ matrix.target }}

      - name: Package — Linux tar.gz
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/oxide-sloc /tmp/oxide-sloc
          tar czf ${{ matrix.bundle }} -C /tmp oxide-sloc

      - name: Package — Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\oxide-sloc.exe" "oxide-sloc.exe"
          Compress-Archive -Path oxide-sloc.exe -DestinationPath ${{ matrix.bundle }} -Force

      - name: Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.bundle }}
          path: ${{ matrix.bundle }}

  # ── Attach both bundles to the GitHub release ─────────────────────────────
  upload-release-assets:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: oxide-sloc-linux-x86_64.tar.gz
          path: dist/

      - name: Download Windows bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: oxide-sloc-windows-x64.zip
          path: dist/

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          gh release upload "$TAG" \
            dist/oxide-sloc-linux-x86_64.tar.gz \
            dist/oxide-sloc-windows-x64.zip \
            --clobber \
            --repo ${{ github.repository }}
