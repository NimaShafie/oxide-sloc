# ─────────────────────────────────────────────────────────────────────────────
# oxide-sloc — SonarQube project configuration
#
# The scanner is invoked from the workspace root (mounted at /usr/src in the
# Docker container).  All relative paths below are anchored to the workspace
# root.  The Jenkinsfile passes:
#
#   -Dproject.settings=ci/sonar/sonar-project.properties
#   -Dsonar.host.url=http://10.0.0.8:9000
#
# NOTE: sonar.projectVersion is kept in sync with [workspace.package].version
# in Cargo.toml — update both when cutting a release.
# ─────────────────────────────────────────────────────────────────────────────

# ── Project identity ──────────────────────────────────────────────────────────
sonar.projectKey=oxide-sloc
sonar.projectName=oxide-sloc
sonar.projectVersion=1.3.7
sonar.projectDescription=Source line analysis tool — CLI, web UI, HTML/PDF reports, and CI/CD integration

# ── Links ─────────────────────────────────────────────────────────────────────
sonar.links.homepage=https://github.com/oxide-sloc/oxide-sloc
sonar.links.scm=https://github.com/oxide-sloc/oxide-sloc
sonar.links.ci=https://github.com/oxide-sloc/oxide-sloc/actions
sonar.links.issue=https://github.com/oxide-sloc/oxide-sloc/issues

# ── Source encoding ───────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Source roots ──────────────────────────────────────────────────────────────
# Scope analysis to the Rust workspace crates; keeps shell scripts, TOML,
# Askama HTML templates, and the vendor/ tree out of the source set entirely.
sonar.sources=crates

# Test sources — golden tests and corpus fixture directory in sloc-languages.
sonar.tests=crates/sloc-languages/tests

# ── File inclusions / exclusions ──────────────────────────────────────────────
# Only Rust files counted as production source; non-Rust assets (JS bundles,
# HTML templates, corpus .c/.py/.go/.ts fixtures) are excluded.
sonar.inclusions=**/*.rs

# Patterns that classify a file as test code rather than production code.
sonar.test.inclusions=\
  **/tests/**/*.rs,\
  **/*_test.rs,\
  **/test_*.rs

# Artefact directories and lock/archive files are never analyzed.
sonar.exclusions=\
  target/**,\
  vendor/**,\
  out/**,\
  **/*.lock,\
  **/*.tar.xz,\
  **/*.tar.gz,\
  **/*.sha256

# Don't apply coverage requirements or duplication detection to test code.
sonar.coverage.exclusions=\
  **/tests/**,\
  **/benches/**

sonar.cpd.exclusions=\
  **/tests/**,\
  **/benches/**

# ── External issues (Clippy → SonarQube generic format) ──────────────────────
# Generated by the Jenkinsfile SonarQube scan stage:
#   cargo clippy --message-format=json | scripts/clippy_to_sonar.py
# Path is relative to workspace root.
sonar.externalIssuesReportPaths=clippy-sonar.json

# ── Test coverage ─────────────────────────────────────────────────────────────
# Populated by ci/sonar/generate-coverage.sh (cargo-llvm-cov preferred,
# cargo-tarpaulin as fallback).  The scanner silently skips a report file
# that is absent — safe to leave these set even on runs without coverage.
sonar.coverageReportPaths=coverage/sonar-coverage.xml
sonar.lcov.reportPaths=coverage/lcov.info

# ── SCM / blame ───────────────────────────────────────────────────────────────
# Git blame data drives "introduced by" attribution and new-code period tracking.
# forceReloadAll=false lets the scanner use its blame cache for unchanged files.
sonar.scm.provider=git
sonar.scm.exclusions.disabled=false
sonar.scm.forceReloadAll=false

# ── Quality gate ─────────────────────────────────────────────────────────────
# Fail the scanner (non-zero exit) when the server-side quality gate is not met,
# so the Jenkins stage can propagate the failure back to the build.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# ── Analysis cache ────────────────────────────────────────────────────────────
# Reuse sensor output from the prior analysis; cuts scan time on incremental runs.
sonar.analysisCache.enabled=true

# ── Issue suppressions ────────────────────────────────────────────────────────
# Suppress all imported Clippy lints inside test modules.  Test code routinely
# uses patterns (unwrap, assert macros, ad-hoc helpers) that would produce
# false positives when evaluated against production-code linting rules.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=clippy::*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/tests/**/*.rs

# ── Duplication detection tuning ─────────────────────────────────────────────
# Minimum token count before two blocks are flagged as duplicated.
# Default is 100; lowering it finds smaller clones at the cost of more noise.
sonar.cpd.rust.minimumTokens=80
