services:
  oxide-sloc:
    build: .
    image: oxide-sloc
    ports:
      - "4317:4317"
    restart: unless-stopped
    environment:
      - SLOC_BROWSER=/usr/bin/chromium
      # cap_drop: ALL prevents the kernel-namespace sandbox from working.
      # Set to 0 (or remove) only when running with --cap-add=SYS_ADMIN.
      - SLOC_BROWSER_NOSANDBOX=1
      - RUST_LOG=info
      # Required — generate with: export SLOC_API_KEY=$(openssl rand -hex 32)
      - SLOC_API_KEY=${SLOC_API_KEY:?SLOC_API_KEY must be set — run: export SLOC_API_KEY=$(openssl rand -hex 32)}
      - SLOC_ALLOWED_ROOTS=/repo
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    volumes:
      # Mount a host directory to analyze it via the web UI or CLI.
      # Example: docker compose run oxide-sloc analyze /repo --plain
      - type: bind
        source: ${SLOC_TARGET:-./tmp-sloc}
        target: /repo
        read_only: true
      # Persist generated reports across restarts.
      - type: bind
        source: ./out
        target: /app/out
